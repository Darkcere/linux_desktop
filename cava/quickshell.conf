[general]
# The number of visualizer bars you want in your panel
bars = 10
# Target FPS (match this roughly to your monitor's refresh rate)
framerate = 30

[output]
# Forces cava to output raw numerical data instead of terminal blocks
method = raw
data_format = ascii

# 💡 THE FIX: Maps Cava's max output 1:1 with your QML pixel height!
ascii_max_range = 18
bar_delimiter = 59 ; (ASCII for semicolon)
