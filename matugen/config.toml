[config]
reload_apps = true
contrast = 0.1
#[config.wallpaper]
#command = "awww"
#arguments = [ "img", "-t", "fade", "--transition-duration", "1.0", "--transition-step", "255", "--transition-fps", "60", "-f", "Nearest",]
#set = true
[templates.hyprland]
input_path = "~/.config/Ax-Shell/config/matugen/templates/hyprland-colors.conf"
output_path = "~/.config/Ax-Shell/config/hypr/colors.conf"
#[templates.waybar]                                                                                                                                                             
#input_path = "~/.config/Ax-Shell/config/matugen/templates/waybar.css"                                                                                                            
#output_path = "~/.config/waybar/style.css"
#[templates.vicinae]
#input_path = './templates/vicinae.toml'
#output_path = '~/.local/share/vicinae/themes/matugen.toml'
#post_hook = 'vicinae theme set matugen'
[templates.swaync]                                                                                                                                                             
input_path = "~/.config/Ax-Shell/config/matugen/templates/swaync.css"                                                                                                            
output_path = "~/.config/swaync/style.css"
post_hook = 'swaync-client -rs'
[templates.qt6ct]
input_path = "./templates/qt6ct.conf"
output_path = "/home/duarte/.config/qt6ct/colors/matugen.conf"
[templates.qt5ct]
input_path = "./templates/qt6ct.conf"
output_path = "/home/duarte/.config/qt5ct/colors/matugen.conf"
[templates.gtk4]
input_path = "./templates/gtk.css"
output_path = "/home/duarte/.config/gtk-4.0/colors.css"
post_hook = '~/.config/matugen/templates/scripts/gtk-post-hook.sh'
[templates.gtk3]
input_path = "./templates/gtk.css"
output_path = "/home/duarte/.config/gtk-3.0/colors.css"
post_hook = 'gsettings set org.gnome.desktop.interface gtk-theme ""; gsettings set org.gnome.desktop.interface gtk-theme adw-gtk3-{{mode}}'
[templates.foot]
input_path = '~/.config/matugen/templates/foot.ini'
output_path = '~/.config/foot/foot.ini'
[templates.vencord]
input_path = '~/.config/matugen/templates/vencord.css'
output_path = '~/.config/Vencord/themes/matugen-discord.css'
[templates.qml]
input_path = '~/.config/matugen/templates/colors_quickshell.json'
output_path = '~/.config/quickshell/colors.json'
[config.custom_colors.red]
color = "#FF0000"
blend = true

[config.custom_colors.green]
color = "#00FF00"
blend = true

[config.custom_colors.yellow]
color = "#FFFF00"
blend = true

[config.custom_colors.blue]
color = "#0000FF"
blend = true

[config.custom_colors.magenta]
color = "#FF00FF"
blend = true

[config.custom_colors.cyan]
color = "#00FFFF"
blend = true

[config.custom_colors.white]
color = "#FFFFFF"
blend = true
