shell=fish
title=foot
font=JetBrains Mono Nerd Font:size=12
letter-spacing=0
dpi-aware=no
pad=25x25
bold-text-in-bright=no
gamma-correct-blending=no

[scrollback]
lines=10000

[cursor]
style=beam
beam-thickness=1.5

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+Shift+f

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G

[colors-dark]
foreground={{colors.on_background.default.hex_stripped}}
alpha=0.8
selection-foreground={{colors.on_primary_container.default.hex_stripped}}

cursor={{colors.background.default.hex_stripped}} {{colors.primary.default.hex_stripped}}

# Normal ANSI
regular0={{colors.on_primary.default.hex_stripped}}
regular1={{colors.error.default.hex_stripped}}
regular2={{colors.tertiary.default.hex_stripped | lighten: -10.0}}
regular3={{colors.secondary.default.hex_stripped}}
regular4={{colors.primary.default.hex_stripped}}
regular5={{colors.tertiary.default.hex_stripped}}
regular6={{colors.secondary.default.hex_stripped}}
regular7={{colors.on_surface.default.hex_stripped}}

# Bright ANSI
bright0={{colors.on_primary.light.hex_stripped | lighten: -50.0}}
bright1={{colors.error.default.hex_stripped}}
bright2={{colors.tertiary.default.hex_stripped}}
bright3={{colors.secondary.default.hex_stripped}}
bright4={{colors.primary.default.hex_stripped}}
bright5={{colors.tertiary.default.hex_stripped}}
bright6={{colors.secondary.default.hex_stripped}}

dim-blend-towards=<* if {{ is_dark_mode }} *>black<* else *>white<* endif *>