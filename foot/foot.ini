shell=fish
title=foot
font=JetBrains Mono Nerd Font:size=12
letter-spacing=0
dpi-aware=no
pad=25x25
bold-text-in-bright=no
gamma-correct-blending=no

[scrollback]
lines=10000

[cursor]
style=beam
beam-thickness=1.5

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+Shift+f

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G

[colors-dark]
foreground=f3dde3
alpha=0.8
selection-foreground=000000

cursor=1b1015 ffb0d0

# Normal ANSI
regular0=60003b
regular1=ffb4ab
regular2=ff8d6d
regular3=ffb0d0
regular4=ffb0d0
regular5=ffb5a0
regular6=ffb0d0
regular7=f3dde3

# Bright ANSI
bright0=808080
bright1=ffb4ab
bright2=ffb5a0
bright3=ffb0d0
bright4=ffb0d0
bright5=ffb5a0
bright6=ffb0d0

dim-blend-towards=black