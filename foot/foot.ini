shell=fish
title=foot
font=JetBrains Mono Nerd Font:size=12
letter-spacing=0
dpi-aware=no
pad=25x25
bold-text-in-bright=no
gamma-correct-blending=no

[scrollback]
lines=10000

[cursor]
style=beam
beam-thickness=1.5

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+Shift+f

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G

[colors-dark]
foreground=ebe0e2
alpha=0.8
selection-foreground=ffffff

cursor=171214 fcb1ce

# Normal ANSI
regular0=4f1d35
regular1=ffb4ab
regular2=ff9361
regular3=e2bdc9
regular4=fcb1ce
regular5=ffb694
regular6=e2bdc9
regular7=ebe0e2

# Bright ANSI
bright0=808080
bright1=ffb4ab
bright2=ffb694
bright3=e2bdc9
bright4=fcb1ce
bright5=ffb694
bright6=e2bdc9

dim-blend-towards=black