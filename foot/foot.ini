shell=fish
title=foot
font=JetBrains Mono Nerd Font:size=12
letter-spacing=0
dpi-aware=no
pad=25x25
bold-text-in-bright=no
gamma-correct-blending=no

[scrollback]
lines=10000

[cursor]
style=beam
beam-thickness=1.5

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+Shift+f

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G

[colors-dark]
foreground=e3e2e5
alpha=0.8
selection-foreground=000000

cursor=121316 a8c9f3

# Normal ANSI
regular0=063152
regular1=ffb4ab
regular2=d692da
regular3=bbc7da
regular4=a8c9f3
regular5=e4b8e7
regular6=bbc7da
regular7=e3e2e5

# Bright ANSI
bright0=808080
bright1=ffb4ab
bright2=e4b8e7
bright3=bbc7da
bright4=a8c9f3
bright5=e4b8e7
bright6=bbc7da

dim-blend-towards=black