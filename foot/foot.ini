shell=fish
title=foot
font=JetBrains Mono Nerd Font:size=12
letter-spacing=0
dpi-aware=no
pad=25x25
bold-text-in-bright=no
gamma-correct-blending=no

[scrollback]
lines=10000

[cursor]
style=beam
beam-thickness=1.5

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+Shift+f

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G

[colors-dark]
foreground=e1e2eb
alpha=0.8
selection-foreground=ffffff

cursor=11131a afc6ff

# Normal ANSI
regular0=002c69
regular1=ffb4ab
regular2=ea7cff
regular3=b3c6f6
regular4=afc6ff
regular5=f2afff
regular6=b3c6f6
regular7=e1e2eb

# Bright ANSI
bright0=808080
bright1=ffb4ab
bright2=f2afff
bright3=b3c6f6
bright4=afc6ff
bright5=f2afff
bright6=b3c6f6

dim-blend-towards=black