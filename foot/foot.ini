shell=fish
title=foot
font=JetBrains Mono Nerd Font:size=12
letter-spacing=0
dpi-aware=no
pad=25x25
bold-text-in-bright=no
gamma-correct-blending=no

[scrollback]
lines=10000

[cursor]
style=beam
beam-thickness=1.5

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+Shift+f

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G

[colors-dark]
foreground=e2e2e3
alpha=0.8
selection-foreground=000000

cursor=121414 a8ccd7

# Normal ANSI
regular0=0d333c
regular1=ffb4ab
regular2=bd9dcf
regular3=bbc9cd
regular4=a8ccd7
regular5=d4bfe0
regular6=bbc9cd
regular7=e2e2e3

# Bright ANSI
bright0=808080
bright1=ffb4ab
bright2=d4bfe0
bright3=bbc9cd
bright4=a8ccd7
bright5=d4bfe0
bright6=bbc9cd

dim-blend-towards=black