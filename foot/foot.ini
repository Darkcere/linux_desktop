shell=fish
title=foot
font=JetBrains Mono Nerd Font:size=12
letter-spacing=0
dpi-aware=no
pad=25x25
bold-text-in-bright=no
gamma-correct-blending=no

[scrollback]
lines=10000

[cursor]
style=beam
beam-thickness=1.5

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+Shift+f

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G

[colors-dark]
foreground=e7e1e3
alpha=0.8
selection-foreground=b39fb5

cursor=141314 d5c0d7

# Normal ANSI
regular0=382a3c
regular1=ffb4ab
regular2=d498aa
regular3=cfc3cd
regular4=d5c0d7
regular5=e3bcc8
regular6=cfc3cd
regular7=e7e1e3

# Bright ANSI
bright0=808080
bright1=ffb4ab
bright2=e3bcc8
bright3=cfc3cd
bright4=d5c0d7
bright5=e3bcc8
bright6=cfc3cd

dim-blend-towards=black