shell=fish
title=foot
font=JetBrains Mono Nerd Font:size=12
letter-spacing=0
dpi-aware=no
pad=25x25
bold-text-in-bright=no
gamma-correct-blending=no

[scrollback]
lines=10000

[cursor]
style=beam
beam-thickness=1.5

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+Shift+f

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G

[colors-dark]
foreground=e7e0e8
alpha=0.7
selection-foreground=ffffff

cursor=141218 d3bbff

# Normal ANSI
regular0=391e6a
regular1=ffb4ab
regular2=ffaeda
regular3=cfc0e6
regular4=d3bbff
regular5=ffaeda
regular6=cfc0e6
regular7=e7e0e8

# Bright ANSI
bright0=808080
bright1=ffb4ab
bright2=ffaeda
bright3=cfc0e6
bright4=d3bbff
bright5=ffaeda
bright6=cfc0e6

dim-blend-towards=black