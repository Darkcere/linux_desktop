shell=fish
title=foot
font=JetBrains Mono Nerd Font:size=12
letter-spacing=0
dpi-aware=no
pad=25x25
bold-text-in-bright=no
gamma-correct-blending=no

[scrollback]
lines=10000

[cursor]
style=beam
beam-thickness=1.5

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+Shift+f

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G

[colors-dark]
foreground=e5e2e2
alpha=0.8
selection-foreground=000000

cursor=131314 c3c6d3

# Normal ANSI
regular0=2b2f39
regular1=ffb4ab
regular2=bfa3b3
regular3=c7c6cb
regular4=c3c6d3
regular5=d4c1cc
regular6=c7c6cb
regular7=e5e2e2

# Bright ANSI
bright0=808080
bright1=ffb4ab
bright2=d4c1cc
bright3=c7c6cb
bright4=c3c6d3
bright5=d4c1cc
bright6=c7c6cb

dim-blend-towards=black