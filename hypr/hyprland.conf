source = /home/duarte/.config/Ax-Shell/config/hypr/colors.conf

monitor = , 1920x1080@144, 0x0, 1
general {
    col.active_border = rgb($primary)
    col.inactive_border = rgb($surface)
    gaps_in = 3
    gaps_out = 3, 8
    border_size = 2
    layout = dwindle
    allow_tearing = true
}

scrolling{
    follow_focus = true
    direction = right
}

dwindle{
    preserve_split = true
}
decoration {
    active_opacity = 0.99
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0
    blur {
        enabled = yes
        size = 4
        passes = 2
        new_optimizations = yes
        contrast = 1
        brightness = 1
    }
    rounding = 5
    shadow {
      enabled = true
      range = 10
      render_power = 2
      color = rgba(0, 0, 0, 0.25)
    }
}

animations {
    enabled = yes
    bezier = myBezier, 0.4, 0.0, 0.2, 1.0
    animation = windows, 1, 2.5, myBezier, popin 80%
    animation = border, 1, 2.5, myBezier
    animation = fade, 1, 2.5, myBezier
    animation = workspaces, 1, 2.5, myBezier, slidefade 20%
}

cursor {
  no_warps = false
}

binds {
  workspace_back_and_forth = true
  allow_workspace_cycles = true
  pass_mouse_when_bound = false
}

xwayland {
  force_zero_scaling = true
}

input {
    kb_layout = pt,us
    kb_variant =
    kb_model =
    kb_rules =
    numlock_by_default= true
    follow_mouse = 1
    sensitivity = -0.5 # -1.0 - 1.0, 0 means no modification.
}

misc {
  disable_hyprland_logo = true
  vrr = 0
  on_focus_under_fullscreen = true
  middle_click_paste = false
}
render{
  direct_scanout = 2
}
debug{
  vfr = true
}
$mainMod = SUPER

bind  = , XF86PowerOff, exec, ~/.config/hypr/scripts/power.sh
# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod, 36, exec, foot  # 36 = Enter
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, forcekillactive
bind = $mainMod, N, exec, nautilus
bind = $mainMod ALT, N, exec, nautilus
bind = $mainMod SHIFT, F, togglefloating,
bind = $mainMod SHIFT, M, workspace, 5
bind = $mainMod SHIFT, M, exec, spotify
bind = $mainMod SHIFT, B, exec, ~/.config/hypr/scripts/changeblur.sh
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
#move floating window
binde = $mainMod ALT, left, moveactive, -50 0
binde = $mainMod ALT, right, moveactive, 50 0
binde = $mainMod ALT, up, moveactive, 0 -50
binde = $mainMod ALT, down, moveactive, 0 50
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + CTRL + [0-9]
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, TAB, workspace, e+1
bind = $mainMod CTRL, mouse_down, workspace, -1
bind = $mainMod CTRL, mouse_up, workspace, +1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = ,122, exec, /home/duarte/.config/hypr/scripts/volume.sh --dec #volume up
bind = ,123, exec, /home/duarte/.config/hypr/scripts/volume.sh --inc #volume up
bind = ,121, exec, /home/duarte/.config/hypr/scripts/volume.sh --mute
bind = ,Pause, exec, /home/duarte/.config/hypr/scripts/volume.sh --mute-mic  
bind = $mainMod, M, fullscreen, 1 
bind = $mainMod, F, fullscreen 
bind = ALT, tab, cyclenext
bind = ALT, tab, bringactivetotop
# Screenshots:#
bind = ,Print, exec, $HOME/.config/Ax-Shell/scripts/screenshot.sh s
bind = CTRL,Print, exec, $HOME/.config/Ax-Shell/scripts/screenshot.sh p
bind = ALT,Print, exec, $HOME/.config/Ax-Shell/scripts/screenshot.sh w

binde = $mainMod CTRL,up, movewindow, u
binde = $mainMod CTRL,down, movewindow, d
binde = $mainMod CTRL,left, movewindow, l
binde = $mainMod CTRL,right, movewindow, r

#resize windows
binde = $mainMod SHIFT, right, resizeactive,50 0
binde = $mainMod SHIFT, left, resizeactive,-50 0
binde = $mainMod SHIFT, up, resizeactive,0 -50
binde = $mainMod SHIFT, down, resizeactive,0 50
#scrolling layout
binde = $mainMod SHIFT, right, layoutmsg, colresize +0.05
binde = $mainMod SHIFT, left, layoutmsg, colresize -0.05
binde = $mainMod SHIFT, down, layoutmsg, colresize +0.05
binde = $mainMod SHIFT, up, layoutmsg, colresize -0.05
bind = $mainMod, mouse_up, cyclenext
bind = $mainMod, mouse_down, cyclenext, previous
# special workspace
bind = $mainMod ,escape, togglespecialworkspace, magic
bind = $mainMod SHIFT, escape, movetoworkspace, special:magic
bind = $mainMod ALT, Return, layoutmsg, rotatesplit

#windowrule
#windowrule = no_screen_share on, match:class ^(zen)
windowrule = workspace 5 silent, match:class ^([Ss]potify)$
windowrule = workspace 2, match:class ^(steam_app_.*)$
windowrule = opacity 1.00, match:class ^com.github.iwalton3.jellyfin-media-player
windowrule = opacity 1.00, render_unfocused on, match:class ^(steam_app_.*)$
windowrule = workspace 2, match:class ^COBBLEVERSE
windowrule = float 1, match:title ^(Picture-in-Picture)$
windowrule = pin 1, match:title ^(Picture-in-Picture)$
windowrule = move 1215 678, match:title ^(Picture-in-Picture)$
windowrule = size 700 400, match:title ^(Picture-in-Picture)$ 
windowrule = immediate true, match:class ^(steam_app_.*)$

#playerctl
bind=,172,exec,playerctl play-pause
bind=,171,exec,playerctl next
bind=,173,exec,playerctl previous
bind = $mainMod SHIFT, P, pseudo
# some env variables
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct 
env = QT_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_BACKEND,wayland,x11
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XCURSOR_THEME, Bibata-Modern-Classic
env = XCURSOR_SIZE, 28
# lock screen
bind = $mainMod, L, exec, pidof hyprlock || hyprlock -q 
bind = $mainMod, B, exec, pkill -SIGUSR1 waybar # Toggle hide/show waybar 
bind = $mainMod ALT, R, exec, pkill waybar && waybar 
bind = $mainMod, D,exec, vicinae toggle
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaperselect.sh && pkill waybar && waybar 
bind = $mainMod ALT, W, exec, ~/.config/hypr/scripts/colors_mqtt.sh
bind = $mainMod SHIFT,N, exec, swaync-client -t 
bind = $mainMod, S, exec, swaync-client -t 
bind = $mainMod, V, exec, vicinae vicinae://launch/clipboard/history
bind = $mainMod, T, exec, ~/.config/hypr/scripts/tools.sh
bind = $mainMod, P, exec, ~/.config/hypr/scripts/power.sh
bind = $mainMod, Space, exec, hyprctl switchxkblayout sino-wealth-gaming-kb- next && notify-send -e -u critical "Kb layout $(hyprctl devices -j | jq -r '.keyboards[] | select(.main == true) | .active_keymap')"
# Startup / exec on refresh
exec-once =systemctl --user start hyprpolkitagent
exec = ln -fs $wallpaper ~/.current.wall
exec-once = hyprlock -q --immediate-render 
exec-once = kwalletd6 
exec-once = pgrep -x "hypridle" > /dev/null || hypridle
exec-once = awww-daemon
exec-once =  wl-paste --type text --watch cliphist store
exec-once =  wl-paste --type image --watch cliphist store
exec-once = swaync
exec-once = vicinae server
exec-once = waybar
exec-once = sleep 3 && steam -silent 

#Workspace rules 
workspace = 3, layout:scrolling

